<!doctype html>
<html lang="pt-br">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style-css/style.css" />
    <link rel="shortcut icon" href="./imagens/favicon.ico" type="image/x-icon">
    <title>Cardápio - Cafés Especiais</title>

  </head>

  <body>
    <header>
      <nav class="menuNavegacao">
        <a href="./index.html" class="logoAroma">AROMA CAFÉ </a>
        <a href="#">PRODUTOS </a>
        <a href="#">ADOÇÕES  </a>
        <a href="#">RESERVAS </a>
        <a href="#"><button class="botao-carrinho1">Carrinho</button></a>
      </nav>
    </header>

    <main>
        <section> <!--01-->
            <div class="card">
               <img src="./imagens/Produto_Destaque.png" alt="foto do produto Gatoccino"
               class="card-img">

              <div class="container-nome">
                <h1>Gatoccino</h1>
                <h3>R$24,99</h3>
                
                <img src="./imagens/icon_lactose.png"  title="Contém Lactose" class="icone-lactose">
            

                <p class="texto-produto-destaque">
                  Cappucino cremoso com arte de latte <br> em formato de gatinho.
                </p>

                <button class="botao-carrinho">
                  Colocar no carrinho
                </button>

              </div>
            </div>
        </section>

        <section> <!--02-->
          <h3 class="outras-op"> OUTRAS OPÇÕES </h3>
          
          <div class="grid-produtos">
            <div class="info-produtos">
              <img src="./imagens/lattee.jpg" alt="Bigode Espresso"
              class="card-img-produto"> 

              <h3 class="nome-produto">Bigode Espresso</h3>
              <p class="descricao-produto">Espresso duplo forte para quem precisa de energia</p>
              <span class="preco-produto">R$25,00</span>
            </div>  
            

          </div>

        </section>

    </main>
