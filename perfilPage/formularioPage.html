<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" href="image/documento.png">
    <title>Meu Fomulário</title>
</head>
<body>
    <section class="perfilContainer">
        <div class="infoPerfil">
            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilUsuario">
            <span> Nome Completo </span>
            <span class="destaque"> seuemail@dominio.com </span>
        </div>
<hr>
        <div class="opcoesPerfil">
            <span class="icon"> <img src="./image/User_icon.png" alt="Simbolo do Usuario"> </span>
        </div>
            
            <span class="opcaoConfig"> Minha Conta </span>
            
            <span> <img src="./image/settings-01.png" alt="Simbolo de Engrenagem"> </span>
            <span class="opcaoConfig"> Configurações </span>
            
            <span> <img src="./image/log-out-04.png" alt="Simbolo de Sair"> </span>
            <span class="opcaoConfig"> Sair </span>
    </section>

    <section>
        <div class="infoPrincipais">
            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilConfig"> 
            <img src="./image/editar_pefil_icon.png" alt="Icone de Editar Perfil" class="editarPerfilIcon">

            <p class="tituloPrincipal"> Nome Completo </p>
            <p class="destaque"> seuemail@dominio.com </p>

            <button class="botaoEditarPerfil"> <a href="./perfilPage.html"></a> EDITAR PERFIL </button>
        </div>
    </section>

    <section class="formulario">
        <form class="formulario-primeira-linha">
            <label for="nome"> Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
            <label for="cpf"> CPF </label>
            <input type="number" id="cpf" placeholder="Digite o seu CPF">
            <label for="data-nascimento"> Data de Nascimento </label>
            <input type="number" id="data-nascimento" placeholder="DD/MM/AAAA">
            <label for="telefone"> Número para contato </label>
            <input type="tel" id="telefone" placeholder="(99) 99999-9999">
        </form>


    </section>

    
</body>
</html>
