<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" href="image/user_pageIcon.png">
    <title>Meu Perfil</title>
</head>
<body>

    <!--ADICIONAR O MENU DEPOIS (PROVAVELMENTE)-->

    <section class="perfilContainer">
        <div class="infoPerfil">
            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilUsuario">
            <span> Nome_Usuario </span>
            <span class="destaque"> seuemail@dominio.com </span>
        </div>
<hr>
        <div class="opcoesPerfil">
            <span class="icon"> <img src="./image/User_icon.png" alt="Simbolo do Usuario"> </span>
        </div>
            
            <span class="opcaoConfig"> Minha Conta </span>
            
            <span> <img src="./image/settings-01.png" alt="Simbolo de Engrenagem"> </span>
            <span class="opcaoConfig"> Configurações </span>
            
            <span> <img src="./image/log-out-04.png" alt="Simbolo de Sair"> </span>
            <span class="opcaoConfig"> Sair </span>
    </section>

    <section class="configuracaoPerfilContainer">

        <div class="infoPrincipais">

            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilConfig"> 
            <img src="./image/editar_pefil_icon.png" alt="Icone de Editar Perfil" class="editarPerfilIcon">

            <span class="tituloPrincipal"> Nome Completo </span>
            <span class="destaque"> Nome_Usuario </span>
            <span class="destaque"> seuemail@dominio.com </span>

            <button class="botaoEditarPerfil"> EDITAR PERFIL </button>



        </div>

        <div class="infoSecundarias">
            <label for="email"> E-mail </label>
            <input type="email" placeholder="seuemail@dominio.com" id="email" name="endereco" class="campoPreenchimento">
            <hr>
            <label for="numTelefone"> Número de telefone </label>
            <input type="text" placeholder="(11) 99999-9999" id="telefone" name="endereco" class="campoPreenchimento">
            <hr>
            <label for="endereco"> Seu Endereço </label>
            <input type="text" placeholder=" " id="endereco" name="endereco" class="campoPreenchimento">
            <hr>
            <button class="botaoSalvarPerfil"> SALVAR </button>
            <a href="./formularioPage.html" target="_blank" class="botaoFormPerfil"> Formulário de Adoção </a>

        </div>

    </section>
    
</body>
</html>
