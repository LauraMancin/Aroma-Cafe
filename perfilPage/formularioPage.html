<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="icon" href="image/documento.png">
    <title>Meu Fomulário</title>
</head>
<body>
     <section class="perfilContainer">
        <div class="infoPerfil">
            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilUsuario">
            <span> Nome Completo </span>
            <span class="destaque"> seuemail@dominio.com </span>
        </div>
<hr>
        <div class="opcoesPerfil">
            <span class="icon"> <img src="./image/User_icon.png" alt="Simbolo do Usuario"> </span>
        </div>
            
            <span class="opcaoConfig"> Minha Conta </span>
            
            <span> <img src="./image/settings-01.png" alt="Simbolo de Engrenagem"> </span>
            <span class="opcaoConfig"> Configurações </span>
            
            <span> <img src="./image/log-out-04.png" alt="Simbolo de Sair"> </span>
            <span class="opcaoConfig"> Sair </span>
    </section>

    <section class="configuracaoFormContainer">

        <div class="infoPrincipais">

            <img src="./image/user.png" alt="Foto de Perfil do Usuario" class="fotoPerfilConfig"> 
            <img src="./image/editar_pefil_icon.png" alt="Icone de Editar Perfil" class="editarPerfilIcon">

            <span class="tituloPrincipal"> Nome Completo </span>
            <span class="destaque"> seuemail@dominio.com </span>

            <a href="./perfilPage.html" class="botaoEditarPerfil"> EDITAR PERFIL </button>

        </div>

        <form class="infoForms">
            <label> Nome Completo </label>
            <input type="text" placeholder="Digite seu nome completo" class="campoPreenchimento">
            <hr>
            <label> Data de Nascimento </label>
            <input type="date" placeholder="DD/MM/AAAA" class="campoPreenchimento">
            <hr>
            <label> Seu Endereço </label>
            <input type="text" placeholder="Ex: Rua. Exemplo" class="campoPreenchimento">
            <hr>
            <label> Número </label>
            <input type="text" placeholder=" n° " class="campoPreenchimento">
            <hr>
            <label> Complemento </label>
            <input type="text" placeholder=" Ex: Ap 101 "  class="campoPreenchimento">
            <hr>
            <label> CEP </label>
            <input type="text" placeholder="00000-000" class="campoPreenchimento">
            <hr>
            <label> Moradia </label>
            <input type="text" placeholder="Ex: Casa ou Apartamento" class="campoPreenchimento">
            <button class="botaoSalvarPerfil"> SALVAR </button>

        </form>

    </section>
    

    
</body>
</html>
