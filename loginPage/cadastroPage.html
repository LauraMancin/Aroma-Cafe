<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/style.css">
    <title>Cadastro</title>
</head>
<body>
    <main>
        <section class="sectionLoginAndCadastro">

            <div class="containerCadastro containerLoginAndCadastro">
                <div>
                    <h2 class="tituloPrincipal"> CADASTRE-SE </h2>

                    <div class="formGroup">
                        <label>Seu nome:</label>
                        <input type="text" placeholder="Digite o seu nome completo" class="botaoDigitar">
                    </div>
                    
                    <div class="formGroup">
                        <label>Seu User:</label>
                        <input type="text" placeholder="Digite o seu User" class="botaoDigitar">
                    </div>

                    <div class="formGroup">
                        <label>E-mail:</label>
                        <input type="text" placeholder="Digite o seu e-mail" class="botaoDigitar">
                    </div>

                    <div class="formGroup">
                        <label>Senha:</label>
                        <input type="text" placeholder="Digite a sua senha" class="botaoDigitar">
                    </div>

                    <div class="formGroup">
                        <label>Confirmar senha:</label>
                        <input type="text" placeholder="Confirme a sua senha" class="botaoDigitar">
                    </div>

                <div class="containerBotao">
                    <a href="#"> <img src="./image/google 2.png" alt="Simbolo do Google"> ENTRAR COM O GOOGLE</a>
                </div>

                <div class="containerBotao">
                    <a href="./loginPage.html"> CRIAR </a>
                </div>

                <p class="textoAviso"> *Você irá retornar para a página inicial</p>

            </div>
        </section>
</body>
</html>
